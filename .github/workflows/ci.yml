name: CI

# Engine 95+ HIGH #2 (card cd010960): run the FULL suite on every push/PR, with the sealed crypto substrate
# actually present — so coverage is real, not skipped. GB [351] #2: no silent skip false-green — the substrate
# is asserted loudly (RED if absent) and a zero-skip guard fails the build if any test silently drops out.

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      # The bootstrap discovers breathline_primitives here (root package or worktrees/dev layout).
      BREATHLINE_SEALED_ROOT: ${{ github.workspace }}/.breathline-sealed
    steps:
      - uses: actions/checkout@v4

      - name: Clone the sealed crypto substrate (breathline_primitives — P1 ECDSA + P5 Merkle)
        run: git clone --depth 1 https://github.com/breathline-federation/breathline-sealed.git "$BREATHLINE_SEALED_ROOT"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (reproducible — constraints-pinned, HIGH #3)
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[dev,crypto-assurance]"

      - name: Assert the crypto substrate loaded (loud RED if absent — no skip-everything false-green)
        run: |
          python - <<'PY'
          from sovereign_agent.bootstrap import ensure_breathline_primitives
          assert ensure_breathline_primitives(), "breathline_primitives failed to load — CI cannot verify crypto coverage"
          import breathline_primitives
          print("substrate OK:", breathline_primitives.__file__)
          PY

      - name: Run the full test suite (+ JUnit report for the skip guard)
        run: pytest -p no:cacheprovider --junitxml=/tmp/report.xml

      - name: Zero-skip guard (a silent skip is lost coverage — fail RED, robustly)
        # GB [351] #2 intent (no silent false-green) WITHOUT the structural false-RED of grepping summary
        # text (audit 2026-06-16 #b): read the AUTHORITATIVE skipped count from the JUnit XML, not a grep.
        if: always()
        run: |
          python - <<'PY'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse("/tmp/report.xml").getroot()
          suites = root.findall(".//testsuite") or ([root] if root.tag == "testsuite" else [])
          skipped = sum(int(s.get("skipped", "0")) for s in suites)
          total = sum(int(s.get("tests", "0")) for s in suites)
          print(f"tests={total} skipped={skipped}")
          if skipped:
              print("::error::tests skipped with the substrate present — coverage silently lost")
              sys.exit(1)
          PY

      - name: Dependency CVE scan (M2/M3 — pip-audit; complements the constraints lock + crypto floor)
        # Advisory-first (audit 2026-06-16 M3): surfaces known CVEs in the resolved deps without gating the
        # build yet (continue-on-error). Harden to a hard gate once the baseline is clean.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --desc || true
