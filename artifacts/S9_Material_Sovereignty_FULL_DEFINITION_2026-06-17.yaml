  volumes:
  - series: 9
    vol: 1
    title: The Material Primitive — Receipted Local Provisioning
    subtitle: From Digital Governance to Verifiable Physical Output
    description: '<p><strong>Turn sovereign software into sovereign provision.</strong></p><p>This foundational
      volume shows how to extend the harness into the physical world: receipted local production of energy,
      water, food, and shelter. Every material flow becomes verifiable. Every critical action stays under
      human primacy. Built for families and communities who want resilience without central dependency.</p><p>You
      will learn the core patterns that make physical systems forkable, auditable, and inheritable — the
      bridge from digital sovereignty to real-world independence.</p>'
    bisac_categories:
    - BUSINESS & ECONOMICS / Infrastructure
    - TECHNOLOGY / Social Aspects
    - SELF-HELP / Personal Growth / Success
    keywords_7:
    - local provisioning systems
    - sovereign physical infrastructure
    - receipted production
    - resilient community models
    - generative local economy
    - verifiable material flows
    - forkable physical systems
    chapters:
    - n: 1
      title: The Provision Gap
      promise: You will clearly see why digital sovereignty alone is insufficient for generational thriving
        under resource stress.
      beats:
      - Current displacement and concentration trends
      - Limits of information-only systems
      - The material substrate missing
      - Sovereign primitive opportunity
      - LGP provision risk
      keywords:
      - provision gap
      - material sovereignty
      - resilience beyond software
      - generational physical needs
    - n: 2
      title: Receipted Flows — Extending the Harness to Matter
