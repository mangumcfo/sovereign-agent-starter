      promise: You will be able to build an automated disruption response agent that detects a signal and generates three
        costed, probability-weighted response options in minutes — illustrated by a port-strike response that saved $446K
        versus inaction.
      beats:
      - Five years of disruption (pandemic, Suez blockage, port strikes, semiconductor shortages, Red Sea reroutes, tariffs,
        and 2026 Strait of Hormuz tensions) proves geopolitical disruption is continuous, not episodic
      - The agent levels the playing field — a well-configured mid-market disruption agent responds as fast as a Fortune 500
