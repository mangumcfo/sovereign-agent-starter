    - n: 6
      title: Capacity Planning and Dynamic Resource Allocation Agents
      promise: You will be able to replace static spreadsheet capacity models with a living capacity-planning agent that recalculates
        available versus required capacity daily, models scenarios, and quantifies rebalancing economics across the S&OP horizon.
      beats:
      - 'Capacity planning is a multi-horizon problem within S&OP: long-range (12-24 months, capital), medium-range (3-12
        months, workforce and contract commitments), and short-range (1-12 weeks, tactical scheduling).'
      - 'Static models are accurate snapshots that go stale: a January model misses the February machine failure, the March
        new customer, and the April supplier delay; the agent maintains a living model that updates continuously.'
      - The capacity-planning agent prompt calculates available vs. required capacity by work center, identifies bottlenecks,
        alerts on >85% utilization for 2+ weeks, and runs scenario modeling (add a shift, +15% demand, machine down, new contract).
      - The dynamic resource allocation worked example (WindowCraft, 2 plants, 22 lines) found 3 product families transferable
        from overloaded to underloaded lines for an $85K one-time tooling investment, quantifying $1.6M annual savings with
        19-day payback.
      - The agent's value is the specific product-to-line mapping with quantified economics that justifies investment, not
        the intuition (which the planner already had) that lines were imbalanced.
      - For high demand variability, the agent models buffering strategies (overtime, subcontracting, inventory, flexible
        cross-trained workforce) with quantified costs and trade-offs, but the operations leader makes the buffering decision.
