      coherence_pin: null
    - n: 10
      title: When Manufacturing Agents Fail — Case Studies and Lessons Learned
      promise: You will recognize the failure modes that derail manufacturing agent deployments through four case studies,
        and learn the governance fixes (cross-correlation, full-envelope training data, system-level constraint logic, hard-coded
        utility limits) that prevent them.
      beats:
      - Case studies are illustrative composites; the unifying lesson from McKinsey is that tracking only outcomes makes it
        impossible to find what went wrong, so agent performance must be verified at each workflow step - and in every case
        the experienced operator's shop-floor judgment caught what sensors could not.
      - 'Case 1 - the PdM agent shut down the wrong line ($290K + $72K): a vibration anomaly on Press 4 was actually transmitted
        through the shared foundation from Press 5''s new high-tonnage die; fix was cross-correlation across adjacent presses,
        die-change context, and differential diagnosis. Lesson: machines are physically interconnected.'
      - 'Case 2 - the quality agent created false rejects ($297K): vision model trained on controlled-lab lighting flagged
        second-shift warmer lighting as discolored housings, doubling reject rate to 5.6% (6.2% second shift, 0.8% first);
        fix was retraining on the full production lighting envelope plus lighting normalization. Lesson: training data must
        match the full operating envelope.'
      - 'Case 3 - the scheduling agent starved the bottleneck ($410K): optimizing each stage independently cut changeovers
        35% but starved the filling-line bottleneck with feast-or-famine batches, dropping throughput 8%; fix was a system-level
        objective maximizing the bottleneck first. Lesson: Theory of Constraints (Goldratt) - only bottleneck improvement
        matters.'
      - 'Case 4 - the energy agent tripped the safety system ($56K): shutting a standby compressor saved $8,200/month until
        a pneumatic leak dropped pressure, releasing safety clamps and damaging a laser head; fix was a hard-coded minimum
        compressor capacity (85 PSI even with a 100-CFM surge), warm standby, and spring-return fail-safe clamps. Lesson:
        energy agents must never compromise safety systems.'
      - 'Cross-cutting takeaways: map every agent''s decision scope against safety systems and add hard-coded limits where
        physical risk exists; use cross-correlation across adjacent equipment for PdM; and configure scheduling agents to
        optimize the bottleneck first, not stages in isolation.'
      keywords:
      - manufacturing agent failure modes
      - cross-correlation vibration analysis
      - training data operating envelope
      - Theory of Constraints bottleneck
      - safety system dependency
      stage: enriched
      coherence_pin: null
    - n: 11
      title: The Ops Leader's 60-Day Manufacturing Agent Deployment Roadmap
      promise: You will have a phased 60-day deployment roadmap (with budget, ROI, and a Level 0 manual-data path) plus the
        role-evolution and executive-pitch frameworks needed to take manufacturing agents from pilot to scaled value.
      beats:
      - The 60-day roadmap accounts for manufacturing's added complexity (OTN cybersecurity, edge-cloud hybrid, real-time
        latency, safety) and stays achievable for a mid-market plant; even Level Zero plants (manual data, paper records,
        spreadsheets) start here by building the data foundation.
      - 'Budget for a mid-market plant: $70-170K over 60 days across four phases plus $3-8K/month ongoing; expected ROI of
        $1.5-4M annually for a $200M manufacturer yields 2-4 month payback (predictive-maintenance-only often pays back in
        90 days).'
      - 'The four phases: Phase 1 Foundation (Days 1-15: infrastructure/sensor/data-quality audit, pick PdM pilot, shadow
        mode, OEE baseline); Phase 2 Expand (Days 16-35: quality + OEE + scheduling agents, Trust Calibration Level 1, document
        agent catches); Phase 3 Integrate (Days 36-50: scale PdM, energy and CI agents, advance to Level 2); Phase 4 Evaluate
        and Scale (Days 51-60: measure impact, present, plan expansion).'
      - The Level 0 manual-data path lets facilities without MES/historian/SCADA start with daily CSV/Excel exports and smartphone
        photos for batch-mode intelligence ($5-15K setup, $500-1,500/month); after 90 days of data it builds the ROI case
        for Level 1+ infrastructure.
      - 'Human role evolution is one of the fastest ROI levers, not a footnote: Maintenance Technician becomes Reliability
        Engineer, Quality Inspector becomes Quality Intelligence Analyst, Production Planner becomes Scheduling Strategist,
        Process Engineer becomes Process Optimization Lead, Plant Manager becomes Operations Intelligence Leader - all shifting
        from data collection to judgment.'
      - The executive pitch frames problem/solution/investment/return/timeline/risk; closing principles include onboarding
        agents like employees (McKinsey), 'the best use case is the reuse case,' enterprise goal alignment via Hoshin Kanri,
        and multi-agent coordination cutting mean-time-to-repair from 8 hours to under 2 (Deloitte).
      keywords:
      - 60-day deployment roadmap
      - Level 0 manual data path
      - deployment budget and ROI
      - human role evolution
      - ops leader executive pitch
      stage: enriched
      coherence_pin: null
