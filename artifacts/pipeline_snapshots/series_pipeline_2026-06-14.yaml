      - 'You cannot skip stages: a reactive shop needs 60-90 days of baseline data before predictions become reliable, and
        ''the real question is whether your data is ready'' (Romina Guevara, Michelin) - sensor calibration and consistent
        failure coding come first.'
      - 'The PdM agent uses the hybrid pattern: edge continuously monitors vibration, temperature, current, pressure, oil,
