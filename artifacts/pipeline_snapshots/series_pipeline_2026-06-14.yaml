        disruptive as a missed delivery, so ESG belongs on the vendor scorecard from Chapter 4
      - '2026 regulation makes ESG data a compliance obligation with financial penalties: EU CSRD, SEC climate disclosure,
        and California SB 253/261, plus the EU Deforestation Regulation'
      - 'The monitoring challenge spans many dimensions across hundreds of suppliers: carbon (Scope 3), water, labor practices,
        deforestation, conflict minerals, and circular-economy metrics'
