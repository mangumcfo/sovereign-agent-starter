        memory, domain-specific models, and orchestration systems.'
      - The US enters with formidable advantages (research, capital, compute) but faces real risks from China, EU regulation,
        and talent migration — the window is real but not permanent.
      - 'The book''s central argument: the US has every structural advantage to lead, but only if leaders move from awareness
        to action with strategic discipline.'
