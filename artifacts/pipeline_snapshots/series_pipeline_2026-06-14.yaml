      - Porter's Five Forces reframed for personal competitive dynamics explains the feeling of replaceability through rivalry,
        new entrants, employer/supplier bargaining power, and the threat of substitution (the AI question).
      - Case studies (Marcus — side project to second career via ERRC recombination; the Health Flywheel — the author's mid-thirties
        health transformation through all four cycles) show the frameworks work beyond career, plus Chapter 2 action items.
