      title: Embrace Change --- The Renewal Cycle
      promise: You will build the capacity to navigate disruption you did not choose — using Kotter's 8-Step Change Model,
        the Resource-Based View, and a Resilience Inventory to turn external shocks into fuel that feeds the Flywheel back
        to Cycle 1.
      beats:
      - Cycle 4 is about the external forces you cannot control but must respond to; the discipline (learned from financial
        bridge analysis) is to separate controllable from non-controllable factors and channel energy only into the controllables.
      - Kotter's 8-Step Change Model (create urgency, build a guiding coalition / Master Mind, form a strategic vision, enlist
        support, remove barriers, generate short-term wins, sustain acceleration, institute change) systematizes personal
        transformation.
      - The Resource-Based View applies the VRIN framework to take inventory of skills, experience, network, traits, and knowledge;
        the author's biggest insight was that underutilized assets (writing, speaking, technology interest) were his biggest
        growth opportunities.
      - The Resilience Inventory rates six dimensions 1-5 — Financial, Relational, Skill, Health, Identity, and Network resilience
        — to find vulnerabilities before disruption arrives; the author's identity resilience scored a 2 and became the priority.
      - AI-Powered Adaptation shows how AI tools can pressure-test each framework (Kotter steps, resource inventory, resilience
        plan, scenario generation), excelling at divergent thinking while convergent decisions remain the reader's job.
      - 'Case study (David — reinvention after a setback): a laid-off marketing director at 52 used Kotter, RBV, Blue Ocean,
