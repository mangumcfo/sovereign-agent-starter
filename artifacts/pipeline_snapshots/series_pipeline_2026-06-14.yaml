      title: When Supply Chain Agents Fail — Case Studies and Lessons Learned
      promise: You will learn from four composite failure case studies that every costly supply chain agent failure traces
        back to incomplete perception, single-variable optimization, over-trust, or dirty data — and the specific fix for
        each.
      beats:
      - 'Case 1 — The $2M inventory reorder: the agent over-weighted a viral social signal over correct POS data; fix is a
        consensus mechanism that flags conflicts, presents both scenarios, and recommends a hedged response (cost: $520K)'
      - 'Case 2 — The logistics agent that optimized itself into a corner: routing 35% of volume to the cheapest carrier created
        a single point of failure when it failed; fix is a 25% per-lane concentration limit plus carrier financial-health
        monitoring (cost: $890K)'
      - 'Case 3 — The demand agent that missed the channel shift: blind to a marketplace channel, it misread a channel shift
        as a demand decline and cut production; fix is broader perception monitoring all channels (cost: $1.68M)'
      - 'Case 4 — The ERP data nobody cleaned: 47 SKUs with stale lead times caused stockouts; fix is a mandatory pre-deployment
        data quality audit — $5,000 prevention vs $310,000 cost, a 62:1 ratio'
      - 'Cross-cutting lessons: tacit knowledge requires continuous human-agent feedback; data quality is a continuous discipline
