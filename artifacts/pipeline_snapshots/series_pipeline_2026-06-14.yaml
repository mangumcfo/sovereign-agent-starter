    - n: 9
      title: Continuous Improvement (Lean/Six Sigma) Agents
      promise: You will be able to deploy continuous improvement and cost-optimization agents that automate the identification
        and prioritization of Lean/Six Sigma opportunities so human teams spend their time executing the highest-value projects.
      beats:
      - 'The bottleneck in continuous improvement is not methodology but capacity: a Kaizen event ties up a cross-functional
        team for 3-5 days and a DMAIC project ties up a Black Belt for 4-6 months, limiting how many opportunities get identified
        and prioritized.'
      - The CI agent prompt analyzes OEE, quality, maintenance, production, safety, and cost data for Lean waste (waiting,
        overproduction, defects, motion, inventory) and Six Sigma variation (Cpk, variation sources, common vs. special cause,
        Gage R&R), then prioritizes by impact/effort.
      - 'Lean + AI + human is a compounding cycle none achieves alone: Lean without AI is periodic and capacity-limited; AI
        without Lean lacks methodology to sustain gains; together the agent monitors 24/7, the team executes with proven methodology,
        and the agent confirms the gain held - the 80/20 flip applied to CI.'
      - The worked example (LeanWorks, 3 Black Belts, 12 Green Belts, $1.5M/year savings) had subjective selection driven
        by the loudest complaint; the agent analyzed 12 months across 35 work centers, found 47 opportunities, and surfaced
        three higher-impact projects than the one being worked, delivering $420K in 60 days.
      - The agent finds the signal; the human designs the countermeasure - the agent does not run the Kaizen event, it ensures
        the Kaizen event targets the highest-value opportunity.
      - A dedicated cost-optimization agent (the COO's priority, often primary in PE-owned companies) synthesizes savings
        across production, maintenance, energy, quality, and procurement into a tracked, prioritized project portfolio managed
        like an R&D pipeline.
