      title: Multi-Agent Architecture Patterns — Orchestrator, Hierarchical, Swarm, and Peer-to-Peer
      promise: You will be able to choose the right multi-agent architecture pattern for your use case from the four fundamental
        options, and separate the pattern decision from which LLM speaks for each role.
      beats:
      - 'Pattern 1 Orchestrator (hub-and-spoke): one central agent decomposes, delegates, collects, synthesizes; specialists
        do not talk to each other; high auditability, 5-15 agents'
      - 'Pattern 2 Hierarchical (multi-level management): mirrors corporate org structure and solves the N-squared problem
        via domain clustering; the natural fit for most enterprises, 15-100+ agents'
      - 'Pattern 3 Swarm (emergent coordination): no central coordinator, agents follow local rules; fast and adaptive but
        low auditability'
      - 'Pattern 4 Peer-to-peer (direct negotiation): agents negotiate competing objectives; scales as O(n-squared), best
        for 3-10 agents'
      - The pattern selection framework table — control, scalability, auditability, latency, failure mode — and the guidance
        to start with orchestrator, layer in hierarchical at scale
      - 'One harness, many speakers: the LLM-per-role decision is separable from the architecture decision; the same governance
        harness binds any speaker, enabling per-role cost-quality and sovereign deployment choices'
