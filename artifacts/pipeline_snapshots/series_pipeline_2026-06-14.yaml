      title: The Integrated Walkthrough
      promise: 'You will be able to run the ten-item per-tranche pre-close checklist from PPA execution to financial close,
        read the gate scorecard''s GREEN flag, and walk two failure cases: the compute off-take failing to sign on time and
        Gate III failing post-close.'
      beats:
      - 'The integrated view: Chapters 4-8 examined each gate in isolation; Chapter 9 integrates them as one system that clears
        together in a specific sequence, where work on one gate produces evidence for another.'
      - The ten-item per-tranche pre-close checklist (PPA, utility capacity, compute off-take, recorded easement, cost-seg
        study, FMV appraisal, §482 benchmark, tax-owner opinion, activity-characterization memo, business-purpose memo), each
        mapped to the gate(s) it supports and an owner; a tranche is ready when all ten are complete and dated.
      - 'The gate scorecard as the close gate: each of the five gates is GREEN only when its specific artifacts integrate,
        reviewed at a pre-close meeting two-to-four weeks out, with YELLOWs escalated to GREEN or triggering a close-date
        push.'
      - 'Day-one funding after haircuts: a table of gate-posture issues and the corresponding reductions to tax-equity proceeds,
        showing the asymmetry where real gate issues drive materially lower (not merely lower) funding.'
      - The full 8-to-12-week pre-close timeline, from site identification and counterparty contracting through tax structuring,
        independent diligence, the scorecard pre-close meeting, financial close, placed-in-service, and the Year-1 K-1.
      - 'Two failure walkthroughs: the compute off-take failing to sign (close as a 3-of-4 structure with a bid haircut, the
        substance defense thinning but holding), and Gate III failing post-close (IRS notice, partnership-level defense, investor
        K-1 amendment, §6662 penalties, reasonable-cause defense anchored on the tax-owner opinion, and contractual recourse
        to the sponsor).'
      - 'What the scorecard does and does not do: it documents the analysis at close, surfaces open work, builds the audit-defense
        record, and disciplines the sponsor, but it does not guarantee the IRS will not challenge or that positions will be
        sustained.'
      keywords:
