    chapters:
    - n: 1
      title: What Is Cryptocurrency?
      promise: You will understand cryptocurrency not as digital money but as a new architecture for trust—one that replaces
        institutional verification with mathematical proof—and be able to weigh the skeptic's case against the believer's
        case with a balanced, professional eye.
      beats:
      - Reframes cryptocurrency as a way to verify transactions and transfer value without a central authority, replacing
        institutional trust with mathematical/cryptographic verification.
      - 'Lays out the five defining properties: digital by nature, decentralized, cryptographically secured, peer-to-peer,
        and globally accessible.'
      - Explains why these properties matter for finance professionals—reduced intermediary cost and no single point of failure,
        but also no single point of accountability and permanent loss from lost private keys.
      - 'Grounds the relevance in concrete facts: stablecoins processing over ten trillion dollars annually, MicroStrategy
        holding billions in Bitcoin, every major institution building crypto infrastructure.'
      - Presents the skeptic's case (volatility, fraud, energy use, regulatory uncertainty) and the believer's case (cheaper
        cross-border payments, smart contracts, financial inclusion, auditability) honestly.
      - Concludes that the truth lives in the middle—crypto won't replace the dollar but will change payments, tokenization,
        identity, and digital trust.
      keywords:
      - architecture of trust
      - mathematical verification
      - five key characteristics
      - skeptic vs. believer
      - intermediary risk
      stage: enriched
      coherence_pin: null
    - n: 2
      title: A Brief History --- From Bitcoin to the Present
      promise: You will be able to trace cryptocurrency's arc from Satoshi's 2008 whitepaper through the 2022–2023 collapses
        to the institutional era of 2024–2026—and draw the single most important lesson about centralized intermediaries from
        that history.
      beats:
      - Opens with the October 2008 Bitcoin whitepaper and the January 2009 genesis block embedding the 'Chancellor on brink
        of second bailout' headline—framing Bitcoin as a response to institutional failure.
      - 'Covers the early years (2009–2013): the 10,000-BTC pizza, the birth of altcoins (Litecoin, Namecoin), and purpose-built
        chains like the XRP Ledger (2012) and Cardano.'
      - 'Traces the Ethereum and platform era (2013–2017): Buterin''s smart-contract vision, the ICO boom and fraud, and the
        SEC''s Howey-test enforcement including the landmark Ripple lawsuit.'
      - 'Details the 2022–2023 crisis: the forty-billion-dollar Terra/Luna collapse, Three Arrows and Celsius failures, and
        the FTX implosion as a governance—not technology—failure.'
      - 'States the era''s central lesson: centralized intermediaries in a decentralized ecosystem recreate exactly the risks
        blockchain was designed to eliminate; self-custodied users were unaffected.'
      - 'Describes the institutional era (2024–2026): eleven spot Bitcoin ETFs, the April 2024 halving, 2025 pro-crypto executive
        orders, MiCA, and Mastercard connecting to the XRPL.'
      keywords:
      - genesis block
      - Satoshi Nakamoto
      - Terra/Luna collapse
      - FTX governance failure
      - spot Bitcoin ETFs
      stage: enriched
      coherence_pin: null
    - n: 3
      title: Blockchain --- The Technology Behind It All
      promise: You will understand blockchain at both the conceptual and architectural level—how blocks chain together, why
        decentralization changes everything, and how the UTXO and account-based models differ—so the rest of the book becomes
        intuitive.
      beats:
      - Demystifies blockchain as a shared record everyone can read and nobody can secretly change, using the distributed-spreadsheet
        analogy.
      - 'Explains the mechanics: each block holds verified transactions, a timestamp, and the previous block''s hash, making
        historical tampering computationally infeasible.'
      - Frames decentralization as the design choice that removes single points of control and failure—illustrated by FTX
        (centralized intermediary failed; the blockchain did not).
      - 'Contrasts two architectural models: Bitcoin''s UTXO model (cash-like, strong privacy and parallelism) versus Ethereum''s
        account-based model (bank-account-like, smart-contract friendly), and clarifies that the data model is independent
        of the consensus mechanism.'
      - 'Breaks down the security model: cryptographic hashing, public/private key authentication, and economic incentives
        that make honest participation rational.'
      - Extends blockchain beyond currency—supply chain, healthcare, voting, trade settlement, parametric insurance—and links
        it to the SIX framework for verifying AI outputs (revisited in Chapter 16).
      keywords:
      - hash chain
      - UTXO vs. account-based
      - decentralization trade-offs
      - cryptographic hashing
      - economic incentives
