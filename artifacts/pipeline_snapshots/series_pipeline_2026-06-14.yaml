    - n: 3
      title: Build Balance --- The Stabilization Cycle
      promise: You will stabilize and consolidate your gains so growth does not become collapse — using a Personal Balanced
        Scorecard, Value Chain Analysis, Core Competence Analysis, and Differentiation Strategy to keep career, health, relationships,
        and finances in balance.
      beats:
      - Stabilization is the least glamorous but most important cycle; growth without operational efficiency is a house built
        on sand, and priorities (spouse first, children/friends second, work third) must be consciously re-ordered.
      - The Personal Balanced Scorecard tracks four life quadrants (Career, Health, Relationships, Personal Growth) with specific
        measurable metrics reviewed weekly; it made the author's work-versus-home imbalance visible and fixable.
      - Value Chain Analysis maps personal finances across stages — Earning, Saving, Investing, Spending, Tax Strategy, and
        Giving — treating a single income source as a single point of failure and savings rate as your personal gross margin.
      - Core Competence Analysis applies the VRIN test (valuable, rare, difficult to imitate, non-substitutable) to define
        what you uniquely bring beyond your job title; your role is what you do, your core competence is the unique combination
        that makes it distinct.
      - Differentiation Strategy moves you from being good (table stakes) to being distinct through narrative, public visibility,
        and choosing your battles — being 'not for everyone' so you are exactly right for the people who matter.
      - 'Case study (Reclaiming Balance): the scorecard exposed 47 work hours versus 4 family hours per week; strategic adjustments
        restored balance without hurting career performance, plus Chapter 3 action items.'
      keywords:
