    - n: 7
      title: Overall Equipment Effectiveness (OEE) Optimization Agents
      promise: You will be able to deploy an OEE agent that does not just calculate the number but decomposes losses into
        the Six Big Losses and surfaces prioritized, financially justified improvement projects per machine.
      beats:
      - OEE = Availability x Performance x Quality; world-class is 85% in discrete manufacturing while most plants run 55-75%,
        making the gap the single largest productivity opportunity.
      - The same 65% OEE can decompose three different ways (quality/performance-driven, availability-dominated, performance-dominated),
        each requiring a different fix; the agent diagnoses root cause rather than just reporting the number.
      - The OEE agent prompt calculates components per machine/shift/product, breaks down the Six Big Losses (breakdowns,
        setup, small stops, reduced speed, startup rejects, production rejects), trends, and ranks top-3 improvements by recoverable
        OEE points.
      - The consumer-products worked example (CleanLine, 18 lines at 62% OEE) used a 90-day Pareto to find Lines 4/7/12 caused
        45% of losses; the highest-impact fix was a $22,000 filling-nozzle repair on Line 7 recovering $340,000 annually,
        overlooked for months.
      - No single agent reaches world-class OEE; DigiSailor's research describes a phased ecosystem (Data, Predictive Maintenance,
        Performance, Quality agents) coordinated by an Orchestrator, with benchmarks of 73% downtime reduction, 34% scrap
        reduction, 4.5-month payback.
      - Micro-stops (under 2 minutes, usually unlogged) account for ~7% of production time; real-time OEE dashboards updated
        every 5 minutes drive immediate supervisor behavior versus next-day reports 12-18 hours late.
      keywords:
