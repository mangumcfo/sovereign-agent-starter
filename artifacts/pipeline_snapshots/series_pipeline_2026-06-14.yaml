      title: What This Means for the Investor
      promise: You will be able to read your own K-1 footnote language line by line and ask counsel the five questions that
        determine whether to wire capital.
      beats:
      - 'The investor''s four-component return profile: Year-1 tax shield (bonus depreciation plus ITC, 99% allocated early),
        operating cash distributions (Years 1-10), residual after the partnership flip (Years 10-15), and exit value; this
        is a depreciation-driven investment where the Year-1 shield is the bulk of nominal return.'
      - 'The recapture tail (Years 6-10): on disposition, prior bonus depreciation is recaptured under §1245 as ordinary income
        to the extent of gain (e.g., a $90K sale with $0 adjusted basis is fully recaptured), plus the separate §50(a) ITC
        recapture sliding scale within five years of placed-in-service.'
      - A risk matrix tying each of the five gates to the investor's specific risk and mitigation, with Gates III and V flagged
        as catastrophic (entire shield disappears plus penalties) versus the others being recoverable.
      - 'K-1 line-by-line walkthrough: what appears on Lines 1, 8/9a, 11, 13, 15 (the ITC), 16, 17 (AMT items), 18, 19, and
        20, plus the reproduced voluntary footnote language covering §168(k) bonus depreciation, the §48E ITC and §50(a) recapture
        caveat, the tax-owner opinion, and the §482 study.'
      - How at-risk and passive limitations land on the investor's return via Form 6198, Form 8582, Form 3800, and Form 6251,
