      beats:
      - 'Quality costs are iceberg costs: visible scrap/rework/warranty is 2-5% of revenue, hidden costs are 2-4x that, putting
        total cost of quality at 8-20% of revenue.'
      - SPC works only when someone watches the charts, and alert fatigue is endemic; an SPC agent applies Western Electric
        and Nelson rules plus multivariate detection, distinguishes common from special cause, and correlates shifts with
        upstream changes (material lots, operator, environment).
      - Actionable alerts replace 'point out of spec on chart 17' with a diagnosis that ties the drift to a recent material-lot
        change and recommends a specific hold/verification action.
      - The injection-molding worked example (MoldTech, 24 machines, 120 parts) shows a continuous-monitoring prompt with
        severity-tiered alerts, zero-tolerance rules for medical parts, and hard 'never' constraints; it cut detection lag
        from 3 hours to 12 minutes, preventing ~850 defective parts/month.
      - 'Vision-system integration: the agent''s role is interpretation, not replacement; it adds context to a vision reject
        (e.g., third scratch on Machine 12 in an hour, tooling changed 90 minutes ago) to convert detection into root-cause
        diagnosis.'
      - Most organizations undercount total cost of quality by 50-70%; the full number (scrap + rework + inspection labor
        + warranty + complaints + sorting) justifies the agent investment.
