        correlated; missed, a machine fails Thursday at a total cost of ~$560K, versus $12K planned maintenance an agent would
        have triggered 36 hours early.'
      - 'The human element is the competitive advantage: agents make assumptions visible, and the plant manager''s judgment
        challenges them; ''turn the screws'' by starting with loose thresholds and tightening as agents prove reliable.'
      - SQDC (Safety, Quality, Delivery, Cost) is the lens for every agent; the playbook builds agents that schedule, monitor,
        predict, and improve, flipping the 80/20 ratio of data work to judgment.
      keywords:
      - factory floor data explosion
      - SQDC framework
      - cost of manual monitoring
      - agentic data architecture
      - 80/20 flip
      stage: enriched
      coherence_pin: null
    - n: 2
      title: 'Manufacturing Agent Architecture: Planning, Execution, Monitoring, and Improvement Layers'
      promise: You will be able to place every manufacturing agent in a four-layer architecture (Planning, Execution, Monitoring,
        Improvement) and decide what runs on the edge versus the cloud given real-time, latency, and safety constraints.
      beats:
      - 'Manufacturing is unique because the physical world does not wait: a line out of spec produces scrap in real time,
        so latency tolerance is measured in seconds, and unplanned downtime averages $260K/hour.'
      - 'The four layers map to operational cadence: Planning (hours-days, cloud), Execution (seconds-minutes, hybrid), Monitoring
        (milliseconds-seconds, edge), Improvement (hours-weeks, cloud).'
      - 'Manufacturing demands a higher error bar than other domains: target <0.1% on safety-critical agents, <0.5% on quality,
        <1% on scheduling before shadow mode opens; and agents aren''t always the answer (use rules/PLC/analytical AI where
        reasoning isn''t needed).'
      - 'Edge vs. cloud is decisive: edge for vision, machine-health, safety, and SPC; cloud for scheduling, capacity, root
        cause, energy, and maintenance scheduling; hybrid for predictive maintenance and quality trending.'
      - 'Division of labor: specialized ML models (computer vision, time-series, physics-informed, SPC engines) handle sensor
        data; frontier LLMs (Claude, GPT, Grok, Gemini, Llama, Mistral) handle orchestration, reasoning, and communication;
        LLMs must not be overpromised for raw sensor analysis.'
      - 'OTN cybersecurity follows the Purdue Model (Levels 0-5) and ISA/IEC 62443: cloud agents connect only to Level 3/4,
        agent-to-OT is read-only by default through audited conduits and DMZ data gateways/data diodes.'
      - Integrating to floor systems (SCADA/PLC via OPC-UA, MES REST APIs, historians, ERP) varies by protocol maturity; facilities
        without unified infrastructure can start at a CSV/batch Level 2 foundation.
      keywords:
      - four-layer agent architecture
      - edge vs cloud deployment
      - OTN cybersecurity Purdue Model
      - ISA/IEC 62443
      - OPC-UA integration
      stage: enriched
      coherence_pin: null
    - n: 3
      title: Production Scheduling and Sequencing Agents
      promise: You will be able to deploy a production scheduling agent that replaces hours of manual calculation, optimizes
        changeover sequencing, and dynamically reschedules around disruptions while leaving trade-off judgment to the planner.
      beats:
      - 'Scheduling is the highest-leverage manufacturing decision: a 10% efficiency improvement cascades into throughput,
        changeover time, on-time delivery, overtime, and WIP; manual scheduling consumes ~6 hours daily and breaks on first
        disruption.'
      - The discrete-manufacturing worked example (PrecisionParts, 8 CNC centers, 45 parts) shows the agent prompt structure
        (inputs, optimize-for priorities, constraints, output) and produces an illustrative 72-hour schedule with risk alerts
        and utilization forecasts.
      - The agent evaluates thousands of sequencing permutations a human cannot, finding changeover groupings that save ~45
        minutes per shift, which across 8 machines x 3 shifts equals ~18 hours of recovered capacity per day.
      - 'The job-shop / high-mix-low-volume case (TitanWorks, 230+ parts, AS9100 constraints) is qualitatively harder: setup
        dominates (35-45% of time), routings are unique, and setup depends on both outgoing and incoming jobs; the agent cut
        setup time 32% and lifted on-time delivery from 82% to 94%.'
      - Changeover optimization addresses sequencing (vs. SMED, which addresses the physical changeover); grouping 'similar'
        jobs compounds savings in facilities running 20+ changeovers per shift.
      - 'Dynamic rescheduling is where ROI lives: a static schedule survives ~2 hours; when the MES reports a disruption,
        the agent recalculates ripple effects and presents quantified trade-off options for the planner''s final authority.'
      keywords:
      - production scheduling agent
      - changeover optimization
      - dynamic rescheduling
      - job shop high-mix-low-volume
