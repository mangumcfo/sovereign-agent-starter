    - n: 5
      title: How Cryptocurrency Works
      promise: You will understand the practical mechanics of cryptocurrency—how transactions are signed and confirmed, where
        assets really live, how consensus keeps the network honest, and how Layer-2 scaling makes blockchain viable for mainstream
        commerce.
      beats:
      - 'Walks through a transaction: specifying recipient and amount, signing with a private key, broadcast to the mempool,
        and confirmation by miners/validators (Bitcoin ~10 min, Ethereum ~12 sec), with fees as incentive.'
      - Clarifies that wallets hold private keys, not coins, and distinguishes exchange custody (trusting an intermediary,
        per FTX) from self-custody via hardware wallets (Ledger, Trezor).
      - 'Acknowledges that cold wallets carry their own risks (firmware, supply-chain attacks) and offers mitigations: audited
        manufacturers, direct purchase, and distributing assets across brands.'
      - Notes the institutional custody layer—Coinbase Custody, Fidelity Digital Assets, Anchorage—and frames custody as a
        deliberate sovereignty trade-off.
      - 'Compares consensus mechanisms: Proof of Work, Proof of Stake, Delegated PoS, Proof of Authority, and Proof of History,
        each balancing security, decentralization, throughput, and energy.'
      - Explains Layer-2 scaling (optimistic rollups, ZK rollups, state channels, sidechains) as the answer to throughput
        limits, making the 'too slow and expensive' objection increasingly outdated.
