<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" font-family="Helvetica, Arial, sans-serif"><rect x="0" y="0" width="1080" height="1350" fill="#FFFFFF"/><rect x="72" y="120" width="120" height="14" rx="7" fill="#C5A55A"/><text x="72" y="108" font-size="30" fill="#C5A55A" font-weight="bold" letter-spacing="3">CHAPTER 3</text><text x="72" y="250" font-size="58" fill="#1B2A4A" font-weight="bold">Building Rolling</text><text x="72" y="324" font-size="58" fill="#1B2A4A" font-weight="bold">Forecast Agents</text><text x="72" y="428" font-size="36" fill="#5b6678">The rolling forecast is the single</text><text x="72" y="480" font-size="36" fill="#5b6678">highest-value finance agent you can</text><text x="72" y="532" font-size="36" fill="#5b6678">build. Here is why: a traditional</text><text x="72" y="584" font-size="36" fill="#5b6678">forecast is a snapshot.</text><text x="72" y="1286" font-size="26" fill="#C5A55A" font-weight="bold">Mangum · sovereign library</text><text x="1008" y="1286" font-size="26" fill="#5b6678" text-anchor="end">4 / 10</text></svg>